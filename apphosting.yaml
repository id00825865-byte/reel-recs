# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Aumentamos el tiempo de espera a 120 segundos para que la IA tenga tiempo de responder
  # Esto soluciona el "Server Components Render Error" por lentitud.
  timeoutSeconds: 120
  # Limitamos las instancias para controlar el coste en el TFG.
  maxInstances: 1

# Definimos las variables de entorno para que estén disponibles en el enlace público.
env:
  - variable: GOOGLE_GENAI_API_KEY
    value: "AQ.Ab8RN6K1W8UTnHPAJqmnboPC_202a2kk5yf8AtY4gDr_XSmRqA"
